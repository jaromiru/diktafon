# Release: build Linux + Android + iOS artifacts on a version tag (v*),
# checksum them, attest build provenance, and publish a GitHub release.
# macOS runners are free for public repos, so the iOS job costs nothing;
# it ships an *unsigned* ipa (usable via re-signing sideloaders like
# AltStore) — App Store uploads are built and signed locally per
# docs/store/appstore-checklist.md.
#
# Verify a download:
#   sha256sum -c SHA256SUMS --ignore-missing
#   gh attestation verify <file> --repo jaromiru/diktafon
#
# Android signing: if the ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD /
# ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD repo secrets are set, release APKs
# are signed with that keystore; otherwise they fall back to the debug key
# (fine for sideloading — Play uploads need `flutter build appbundle` anyway).
#
# `workflow_dispatch` runs the same builds without publishing a release
# (artifacts land on the workflow run) — use it to smoke-test this pipeline.

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.44.5  # keep in sync with docs/tools.md

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve artifact version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            pubspec="$(sed -n 's/^version: *\([^+]*\)+.*/\1/p' pubspec.yaml)"
            if [[ "$version" != "$pubspec" ]]; then
              echo "::error::Tag v$version does not match pubspec.yaml version $pubspec" >&2
              exit 1
            fi
          else
            version="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-linux:
    needs: preflight
    runs-on: ubuntu-24.04  # released binary needs the runner's glibc or newer
    timeout-minutes: 60
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config libgtk-3-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package bundle
        run: |
          mv build/linux/x64/release/bundle "diktafon-$VERSION-linux-x64"
          tar czf "diktafon-$VERSION-linux-x64.tar.gz" "diktafon-$VERSION-linux-x64"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: diktafon-*-linux-x64.tar.gz
          if-no-files-found: error

  build-android:
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Set up release keystore (optional)
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "$KEYSTORE_BASE64" ]]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret — APKs will be debug-signed."
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      # Reproducible builds: F-Droid rebuilds these APKs on their buildserver
      # at /home/vagrant/build/cz.mod42.diktafon (with a repo-local pub cache)
      # and byte-compares them against the release assets. Two absolute build
      # paths survive into the APK and cannot be normalized by compiler flags
      # — the Dart plugin registrant's file:// URI baked into libapp.so's AOT
      # snapshot, and libomp's ident strings in the engine libs (they ignore
      # -ffile-prefix-map) — so build at the same canonical path.
      - name: Mirror the F-Droid buildserver path
        run: |
          sudo mkdir -p /home/vagrant/build
          sudo chown "$USER" /home/vagrant /home/vagrant/build
          cp -a "$GITHUB_WORKSPACE" /home/vagrant/build/cz.mod42.diktafon

      # NDK 28.2 (android/app/build.gradle.kts ← flutter.ndkVersion) is
      # auto-installed by the Android Gradle Plugin on first build.
      - run: flutter pub get --enforce-lockfile
        working-directory: /home/vagrant/build/cz.mod42.diktafon
        env:
          PUB_CACHE: /home/vagrant/build/cz.mod42.diktafon/.pub-cache
      # --target-platform keeps the split 64-bit-only (armeabi-v7a is
      # neither built by the native CMake project nor shipped).
      - run: flutter build apk --release --split-per-abi --target-platform android-arm64,android-x64
        working-directory: /home/vagrant/build/cz.mod42.diktafon
        env:
          PUB_CACHE: /home/vagrant/build/cz.mod42.diktafon/.pub-cache

      - name: Rename APKs
        run: |
          mv /home/vagrant/build/cz.mod42.diktafon/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             "diktafon-$VERSION-android-arm64-v8a.apk"
          mv /home/vagrant/build/cz.mod42.diktafon/build/app/outputs/flutter-apk/app-x86_64-release.apk \
             "diktafon-$VERSION-android-x86_64.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: diktafon-*-android-*.apk
          if-no-files-found: error

  build-ios:
    needs: preflight
    # Xcode 26 lives on the macOS 26 image — the same SDK the port targets
    # (mandatory for App Store submissions since 2026-04-28).
    runs-on: macos-26
    timeout-minutes: 90
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install ninja  # cmake is preinstalled on the macOS image

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      # dk_whisper/dk_llama as xcframeworks into ios/Frameworks/ (gitignored;
      # the Runner project links + embeds them).
      - name: Build engine xcframeworks
        run: tool/ios/build_engine_frameworks.sh

      - run: flutter pub get
      # No signing on CI: this proves the port compiles against the store
      # SDK and yields an artifact for inspection/sideloading. Store builds
      # are signed locally (needs the team's certificates).
      - run: flutter build ios --release --no-codesign

      - name: Package unsigned ipa
        run: |
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r -y "diktafon-$VERSION-ios-unsigned.ipa" Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: diktafon-*-ios-unsigned.ipa
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-android, build-ios]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write      # create the release
      id-token: write      # sign the provenance attestation
      attestations: write  # store the attestation
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum * | tee SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
